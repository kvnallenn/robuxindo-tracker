name: Robuxindo Tracker

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run Tracker
        run: node app.js
        env:
          TOKEN: ${{ secrets.TOKEN }}
          GAS_URL: ${{ secrets.GAS_URL }}