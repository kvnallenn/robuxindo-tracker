name: Robuxindo Tracker

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

jobs:
  tracker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: node app.js
        env:
          TOKEN: ${{ secrets.TOKEN }}
          GAS_URL: ${{ secrets.GAS_URL }}